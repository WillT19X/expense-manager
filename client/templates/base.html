<!DOCTYPE html>
<html lang="en">
<head>
    <title> Expense Manager </title>
     <!-- importing bootstrap usability/CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
    />

</head>

<body>
    <nav class = "navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class = "navbar-brand" href="#"> Expense Manager </a>
            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="navbar-nav">
                    <a class="nav-link text-light" href="{{ url_for('home') }}"> Home </a> <!-- direct user to the index page(home)-->
                    <a class="nav-link text-light" href="{{ url_for('add_expense') }}"> Add </a> <!-- direct user to adding expenses -->
                    <a class="nav-link text-light" href="{{ url_for('expense_page') }}"> Expenses </a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-3">
        {% block content %}{% endblock %}
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
        crossorigin="anonymous">
    </script>
    <script src ="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
