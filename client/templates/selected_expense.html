{% extends "base.html" %}
{% block content %}

<h1> Chosen Expense Below </h1>
<table>
    <tr>
        <th> ID </th>
        <th> date </th>
        <th> cost </th>
        <th> description </th>
        <th> category </th>
    </tr>
    <tr>
        <td>{{ expense.id }}</td>
        <td>{{ expense.date }}</td>
        <td>£{{ expense.cost_gbp }}</td>
        <td>{{ expense.description }}</td>
        <td>{{ expense.expense_type }}</td>
    </tr>
</table>
{% endblock %}
